<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Alignment Laboratory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Box 1 sits by itself on the left main axis -->
        <div class="box box1">1</div>

        <!-- The wrapper box grouping the links for the right side -->
        <div class="wrapper">
            <div class="box box2">2</div>
            <div class="box box3">3</div>
        </div>    
    </div>
</body>
</html>
